name: Daily NSE Data Fetch

# Runs every day at 2:30 PM UTC = 8:00 PM IST (after NSE close + settle)
on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:        # also lets you trigger it manually from the Actions tab

permissions:
  contents: write           # allows the workflow to commit the updated CSV

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests curl_cffi

      - name: Run fetch (all stocks)
        run: python fetch_data2.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/results2.csv docs/data/meta2.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Daily data update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
